    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  flutter_animate: ^4.2.0+1
  permission_handler: ^12.0.0
  location: ^5.0.0
  flutter_blue_plus: ^1.30.0

dev_dependencies:
  flutter_lints: ^2.0.0
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
